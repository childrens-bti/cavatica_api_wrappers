name: Create Cavatica Projects

on:
  issues:
    types:
      [opened, reopened]

jobs:
  create_cavatica_project:
    runs-on: ubuntu-latest
    environment: cavatica-prod
    permissions:
      contents: read
      issues: write
    strategy:
      matrix:
        python-version: ['3.12.9']
    if: contains(github.event.issue.title, '[Project Creation]')

    steps:
      - name: Checkout API Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
      - name: Debug workspace
        run: |
          pwd
          ls -R
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run Project Creation Script
        env:
          BODY: ${{ github.event.issue.body }}
          URL: ${{ github.event.issue.url }}
        run: |
          python scripts/create_project.py \
          --token ${{ secrets.CAVATICA_TOKEN }} \
          --run
      - name: Close Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue close "$ISSUE_NUMBER" --comment "Deployment finished. Issue closed automatically by CI/CD."
