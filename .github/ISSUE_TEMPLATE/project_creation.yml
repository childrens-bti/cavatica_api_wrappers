name: Cavatica Project Creation
description: Ticket to create Cavatica projects
title: '[Project Creation]: '
type: 'Task'
projects: ['childrens-bti/1']
body:
  - type: input
    id: project_name
    attributes:
      label: Project_Name
      description: Name of project being created
      placeholder: 'my_project'
    validations:
      required: true
  - type: input
    id: billing
    attributes:
      label: Billing
      description: Billing group to use
      placeholder: 'AWS-BTI-Core'
    validations:
      required: true
  - type: checkboxes
    id: users
    attributes:
      label: Users
      description: Additional Cavatica users to add to project
      options:
        - label: bisong
          required: false
        - label: JDAGGETT
          required: false
        - label: kaylyn.clark
          required: false
        - label: goswamim2
          required: false
        - label: patsullivan
          required: false
        - label: schen8
          required: false
